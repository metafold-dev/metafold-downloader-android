<!doctype html>
<html lang="tr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>MetaFold Downloader Lisans Paneli</title>
  <style>
    :root {
      color-scheme: light dark;
      font-family: Arial, sans-serif;
      background: #101417;
      color: #edf4f1;
    }
    body {
      margin: 0;
      padding: 24px;
    }
    main {
      max-width: 1040px;
      margin: 0 auto;
    }
    h1 {
      margin: 0 0 18px;
      font-size: 26px;
    }
    .toolbar, .card {
      background: #1c2428;
      border: 1px solid #344247;
      border-radius: 8px;
      padding: 14px;
      margin-bottom: 12px;
    }
    label {
      display: block;
      margin: 8px 0 4px;
      color: #aebfba;
      font-size: 13px;
    }
    input, select, button {
      border-radius: 8px;
      border: 1px solid #405056;
      padding: 10px;
      font-size: 14px;
    }
    input, select {
      width: 100%;
      box-sizing: border-box;
      background: #11181b;
      color: #edf4f1;
    }
    button {
      cursor: pointer;
      background: #168f7e;
      color: white;
      border: 0;
      margin-top: 10px;
      margin-right: 8px;
    }
    button.secondary {
      background: #4d5f66;
    }
    button.danger {
      background: #b33b3b;
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
    }
    .muted {
      color: #aebfba;
      font-size: 13px;
    }
    .status {
      font-weight: bold;
    }
    @media (max-width: 760px) {
      .grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
<main>
  <h1>MetaFold Downloader Lisans Paneli</h1>

  <section class="toolbar">
    <div class="grid">
      <div>
        <label for="baseUrl">Cloud Functions base URL</label>
        <input id="baseUrl" placeholder="https://europe-west1-PROJECT_ID.cloudfunctions.net">
      </div>
      <div>
        <label for="token">Admin token</label>
        <input id="token" type="password" placeholder="Firebase secret ADMIN_TOKEN">
      </div>
      <div>
        <label for="status">Liste</label>
        <select id="status">
          <option value="pending">Onay bekleyenler</option>
          <option value="active">Aktif lisanslar</option>
          <option value="inactive">Pasif lisanslar</option>
          <option value="all">Tum kayitlar</option>
        </select>
      </div>
    </div>
    <button onclick="loadLicenses()">Listeyi yenile</button>
    <p class="muted">Token sayfaya gomulu degildir; sadece bu oturumda API istegi icin kullanilir.</p>
  </section>

  <section id="list"></section>
</main>

<script>
  const baseUrlInput = document.getElementById("baseUrl");
  const tokenInput = document.getElementById("token");
  const statusInput = document.getElementById("status");
  const list = document.getElementById("list");

  baseUrlInput.value = localStorage.getItem("mfd_base_url") || "";

  async function request(path, options = {}) {
    const baseUrl = baseUrlInput.value.replace(/\/$/, "");
    const token = tokenInput.value.trim();
    localStorage.setItem("mfd_base_url", baseUrl);
    if (!baseUrl || !token) throw new Error("Base URL ve admin token gerekli.");

    const response = await fetch(`${baseUrl}/${path}`, {
      ...options,
      headers: {
        "content-type": "application/json",
        "x-admin-token": token,
        ...(options.headers || {})
      }
    });
    const data = await response.json();
    if (!response.ok) throw new Error(data.message || "Istek basarisiz.");
    return data;
  }

  async function loadLicenses() {
    list.innerHTML = "<p class='muted'>Yukleniyor...</p>";
    try {
      const data = await request(`adminListLicenses?status=${encodeURIComponent(statusInput.value)}`);
      if (!data.items.length) {
        list.innerHTML = "<p class='muted'>Kayit yok.</p>";
        return;
      }
      list.innerHTML = data.items.map(renderCard).join("");
    } catch (error) {
      list.innerHTML = `<p class='muted'>${escapeHtml(error.message)}</p>`;
    }
  }

  function renderCard(item) {
    const id = escapeHtml(item.id);
    const requestId = escapeHtml(item.requestId || item.id);
    return `
      <article class="card">
        <h3>${escapeHtml(item.email || "-")}</h3>
        <p class="muted">Request: ${requestId}</p>
        <p>Durum: <span class="status">${escapeHtml(item.status || "pending")}</span></p>
        <p class="muted">Cihaz: ${escapeHtml(item.deviceLabel || "-")} / ${escapeHtml(item.deviceId || "-")}</p>
        <p class="muted">Lisans: ${escapeHtml(item.licenseKey || "-")}</p>
        <div class="grid">
          <input id="owner-${id}" placeholder="Sahip adi" value="${escapeHtml(item.owner || "")}">
          <input id="expires-${id}" placeholder="Bitis tarihi YYYY-MM-DD" value="${escapeHtml(item.expiresAt || "")}">
          <input id="approved-${id}" placeholder="Onaylayan" value="Ahmet Dogan">
        </div>
        <button onclick="approve('${id}')">Onayla</button>
        <button class="danger" onclick="rejectLicense('${id}')">Pasif yap</button>
      </article>
    `;
  }

  async function approve(id) {
    const body = {
      id,
      owner: document.getElementById(`owner-${id}`).value,
      expires_at: document.getElementById(`expires-${id}`).value,
      approved_by: document.getElementById(`approved-${id}`).value
    };
    await request("adminApproveLicense", { method: "POST", body: JSON.stringify(body) });
    await loadLicenses();
  }

  async function rejectLicense(id) {
    await request("adminRejectLicense", {
      method: "POST",
      body: JSON.stringify({ id, reason: "Admin rejected" })
    });
    await loadLicenses();
  }

  function escapeHtml(value) {
    return String(value || "").replace(/[&<>"']/g, (char) => ({
      "&": "&amp;",
      "<": "&lt;",
      ">": "&gt;",
      '"': "&quot;",
      "'": "&#039;"
    }[char]));
  }
</script>
</body>
</html>
